{% extends "base.html" %}

{% block content %}
<div class="generator-container">
    <h2 class="gen-text">Ținuta ta de astăzi</h2>
    <form method="POST">
        <button type="submit" class="gen-btn">
            Generează Outfit
        </button>
    </form>

    {% if is_post_request %}
        <div class="outfit-display">
            
            <div class="outfit-item">
                <img src="{{ url_for('static', filename=outfit.outerwear.folder + '/' + outfit.outerwear.filename) }}" alt="Outerwear">
            </div>

            <div class="outfit-item">
                <img src="{{ url_for('static', filename=outfit.top.folder + '/' + outfit.top.filename) }}" alt="Top">
            </div>

            <div class="outfit-item">
                <img src="{{ url_for('static', filename=outfit.bottom.folder + '/' + outfit.bottom.filename) }}" alt="Bottom">
            </div>
            
            <div class="outfit-item">
                <img src="{{ url_for('static', filename=outfit.shoes.folder + '/' + outfit.shoes.filename) }}" alt="Shoes">
            </div>

            <div class="outfit-item">
                <img src="{{ url_for('static', filename=outfit.accessories.folder + '/' + outfit.accessories.filename) }}" alt="Accessories">
            </div>

        </div>

        <form method="POST"
              action="{{ url_for('save_outfit') }}"
              class="text-center mt-4">

            <input type="hidden" name="top_id" value="{{ outfit.top.id }}">
            <input type="hidden" name="bottom_id" value="{{ outfit.bottom.id }}">
            <input type="hidden" name="outerwear_id" value="{{ outfit.outerwear.id }}">
            <input type="hidden" name="shoes_id" value="{{ outfit.shoes.id }}">
            <input type="hidden" name="accessories_id" value="{{ outfit.accessories.id }}">

            <button type="submit" class="btn-2">
                Salvează outfit
            </button>
        </form>
    {% endif %}
</div>
{% endblock %}
