{% extends "base.html" %}

{% block content %}

<style>
    .game-image-area {
        height: 400px;
        background-image: url("{{ url_for('static', filename='images/' + state.image) }}"); 
        background-size: contain; 
        background-repeat: no-repeat;
        background-position: center; 
        border-right: 2px solid #ddd;
    }
    .play-area {
        height: 400px;
        position: relative;
        overflow: hidden;
        display: flex;
        background-color: #eee;
    }
    .game-zone {
        flex: 1;
        position: relative;
        border-left: 1px solid #ddd;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 20px;
    }
    .item-icon {
        width: 80px;
        height: 80px;
        background-image: url("{{ url_for('static', filename='images/item.png') }}"); 
        background-size: cover;
        position: absolute;
        bottom: 90px;
    }
    .player-box {
        width: 100%;
        height: 80px;
        /* AFISARE IMAGINE LADA */
        background-image: url("{{ url_for('static', filename='images/player_box.png') }}"); 
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: absolute;
        bottom: 0;
    }
    .clickable-zone {
        cursor: pointer;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
    }
</style>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <h2 class="gen-text">Scor: {{ state.score }} | Nivel: {{ state.level }} / 6</h2>

            {% if state.is_game_over %}
            <div class="gen-text">
                <h1>AI CÂȘTIGAT!</h1>
            </div>
            {% endif %}

            <div class="row g-0 border border-4 shadow-lg">
                
                <div class="col-md-6 game-image-area">
                    <p class="text-center pt-2 fw-bold"></p>
                </div>
                
                <div class="col-md-6 play-area">
                    
                    {% for i in range(1, 4) %}
                    <div class="game-zone">
                        
                        <div class="player-box"></div>
                        
                        {% if not state.is_game_over and state.item_zone == i %}
                        <div class="item-icon"></div>
                        {% endif %}

                        <a href="{{ url_for('minigame_action', zone_clicked=i) }}" class="clickable-zone"></a>
                        
                    </div>
                    {% endfor %}
                    
                </div>
            </div>
            
            <div class="text-center mt-4 mb-5">
                <a href="{{ url_for('minigame_reset') }}" class="btn btn-sm btn-danger mx-3">
                    Reset Joc
                </a>
            </div>
            
        </div>
    </div>
</div>

{% endblock %}
